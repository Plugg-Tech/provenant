[build]
  publish = "web"
  # Static site — no build step. A no-op command avoids the empty-command
  # build error; matches the documented build command in DEPLOY.md.
  command = "echo 'Static site'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/try.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http://127.0.0.1:8000 https://provenant-iz41.onrender.com; img-src 'self' data:; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com"

[[redirects]]
  from = "/api/*"
  to = "https://provenant-iz41.onrender.com/:splat"
  status = 200
  force = false
