[build]
  publish = "web"
  command = "echo 'Static site — no build needed'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/try.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http://127.0.0.1:8000 https://api.useprovenant.xyz; img-src 'self' data:; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com"

[[redirects]]
  from = "/api/*"
  to = "https://api.useprovenant.xyz/:splat"
  status = 200
  force = false
