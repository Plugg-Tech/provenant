# Render Blueprint — Provenant API
# Push this repo to GitHub, then in Render: New + -> Blueprint, pick the repo.
# Set secret env vars in the Render dashboard after deployment.
services:
  - type: web
    name: provenant-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn tangible.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # Provider selection (auto picks whichever key is set)
      - key: TANGIBLE_IDENTITY_PROVIDER
        value: auto
      - key: TANGIBLE_NOTARY_PROVIDER
        value: auto
      # Stripe Identity (set in dashboard)
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Persona Identity (set in dashboard)
      - key: PERSONA_API_KEY
        sync: false
      - key: PERSONA_TEMPLATE_ID
        sync: false
      # PandaDoc Notary (set in dashboard)
      - key: PANDADOC_API_KEY
        sync: false
