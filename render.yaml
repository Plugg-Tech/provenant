# Render blueprint. Push this repo to GitHub, then in Render: New +  ->  Blueprint,
# pick the repo, and set the secret env vars.
services:
  - type: web
    name: provenant-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn tangible.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: TANGIBLE_IDENTITY_PROVIDER
        value: auto          # uses Stripe or Persona when keys are set, else simulated
      - key: TANGIBLE_NOTARY_PROVIDER
        value: auto          # uses PandaDoc when PANDADOC_API_KEY is set, else simulated
      - key: STRIPE_API_KEY
        sync: false          # set in the Render dashboard (sk_test_... then sk_live_...)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false          # set after creating the Stripe webhook (whsec_...)
      - key: PANDADOC_API_KEY
        sync: false          # set in the Render dashboard (sandbox or live key)
      - key: PERSONA_API_KEY
        sync: false          # set in the Render dashboard (sandbox or live key)
